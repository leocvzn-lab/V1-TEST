<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flight Expense Log</title>

<style>
:root {
  --bg:#0b1020;
  --card:#121a2f;
  --accent:#38bdf8;
  --accent2:#2563eb;
  --border:#334155;
}

body { margin:0; font-family:Arial; background:var(--bg); color:white; }

.app { padding:14px; padding-bottom:90px; }

.card {
  background:var(--card);
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}

.option-btn {
  background:var(--accent2);
  color:white;
  border:none;
  border-radius:16px;
  min-height:90px;
  font-size:20px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
}

.option-btn.selected {
  background:#0ea5e9;
  transform:scale(0.95);
  box-shadow:0 0 0 3px #38bdf8 inset;
}

.option-btn:active { transform:scale(0.92); }

.grid { display:grid; gap:10px; }
.grid-2 { grid-template-columns:1fr 1fr; }

input,select {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:5px;
}

button {
  padding:12px;
  border-radius:12px;
  border:none;
}

.primary { background:var(--accent); }
.secondary { background:#334155; color:white; }

.footer {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
}

.footer button {
  flex:1;
  background:#1f2937;
  color:white;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- PIN -->
<div id="pinScreen" class="app">
<h2>PIN</h2>
<input id="pinDisplay" type="password">
<button onclick="submitPin()">Entrar</button>
</div>

<div id="mainApp" class="hidden">

<div class="app" id="newView">

<div class="card">
<h3>Avión</h3>
<div id="aircraftGrid" class="grid grid-2"></div>
</div>

<div class="card">
<h3>Concepto</h3>
<div id="expenseTypeGrid" class="grid grid-2"></div>
</div>

<div class="card">
<h3>Pago</h3>
<div id="paymentGrid" class="grid grid-2"></div>
</div>

<div class="card">
<input id="routeInput" placeholder="VUELO MMIO-KHOU">
<input id="amountInput" type="number" placeholder="Monto">
<input id="dateInput" type="date">
<input id="captainInput" placeholder="Capitán">
<input id="paxInput" placeholder="Pasajero">

<br><br>
<button class="primary" onclick="saveReport()">Guardar</button>
</div>

</div>

<div id="historyView" class="app hidden">
<h2>Historial</h2>
<div id="historyList"></div>
</div>

<div id="summaryView" class="app hidden">
<h2>Resumen</h2>
<div id="summary"></div>
<button onclick="exportCSV()">Exportar</button>
</div>

<div class="footer">
<button onclick="show('newView')">Nuevo</button>
<button onclick="renderHistory(); show('historyView')">Historial</button>
<button onclick="renderSummary(); show('summaryView')">Resumen</button>
</div>

</div>

<script>

const PIN="1234";
const STORAGE="data";

const AIRCRAFTS=["N330WS","N588KC","N861NG","N102AR","Gastos Operativos"];
const EXPENSE_TYPES=["Comida","Carro de renta","Taxi","Uber","Combustible","Otro"];
const PAYMENT_METHODS=["Efectivo","DolarApp MX","DolarApp USD","TC Santander","AMEX","IBC"];

let selA="", selC="", selP="";

function submitPin(){
if(pinDisplay.value===PIN){
pinScreen.style.display="none";
mainApp.classList.remove("hidden");
init();
}
}

function init(){
dateInput.value=new Date().toISOString().split("T")[0];

renderOptions("aircraftGrid",AIRCRAFTS,(v)=>selA=v);
renderOptions("expenseTypeGrid",EXPENSE_TYPES,(v)=>selC=v);
renderOptions("paymentGrid",PAYMENT_METHODS,(v)=>selP=v);
}

function renderOptions(id,list,setter){
let container=document.getElementById(id);
container.innerHTML="";
list.forEach(item=>{
let b=document.createElement("button");
b.innerText=item;
b.className="option-btn";
b.onclick=()=>{
setter(item);
[...container.children].forEach(x=>x.classList.remove("selected"));
b.classList.add("selected");
};
container.appendChild(b);
});
}

function saveReport(){
let data=JSON.parse(localStorage.getItem(STORAGE)||"[]");

data.push({
route:routeInput.value,
date:dateInput.value,
expenseType:selC,
paymentMethod:selP,
amount:amountInput.value,
captain:captainInput.value,
pax:paxInput.value,
aircraft:selA
});

localStorage.setItem(STORAGE,JSON.stringify(data));
alert("Guardado");
}

function renderHistory(){
let data=JSON.parse(localStorage.getItem(STORAGE)||"[]");
historyList.innerHTML=data.map(r=>`
<div class="card">
${r.date} - ${r.aircraft}<br>
${r.expenseType} - $${r.amount}
</div>`).join("");
}

function renderSummary(){
let data=JSON.parse(localStorage.getItem(STORAGE)||"[]");
let total=0;
data.forEach(r=>total+=Number(r.amount));
summary.innerHTML="Total: $"+total;
}

function exportCSV(){
let data=JSON.parse(localStorage.getItem(STORAGE)||"[]");

let headers=["VUELO","FECHA","CONCEPTO","EFECTIVO","DOLAR APP MX","DOLAR APP USD","TC SANTANDER","AMEX","IBC","CAPITAN","PASAJERO","AVION"];

let rows=data.map(r=>{
let e="",mx="",usd="",tc="",amex="",ibc="";

switch(r.paymentMethod){
case "Efectivo": e=r.amount; break;
case "DolarApp MX": mx=r.amount; break;
case "DolarApp USD": usd=r.amount; break;
case "TC Santander": tc=r.amount; break;
case "AMEX": amex=r.amount; break;
case "IBC": ibc=r.amount; break;
}

return [r.route,r.date,r.expenseType,e,mx,usd,tc,amex,ibc,r.captain,r.pax,r.aircraft];
});

let csv=[headers.join(",")].concat(rows.map(r=>r.join(","))).join("\n");

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="reporte.csv";
a.click();
}

function show(id){
newView.classList.add("hidden");
historyView.classList.add("hidden");
summaryView.classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
